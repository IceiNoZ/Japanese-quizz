<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07070f;
  --surface: #0f0f1a;
  --card: #13131f;
  --border: #22223a;
  --text: #eeeef8;
  --muted: #55557a;
  --accent-kata: #ff3c6e;
  --accent-hira: #06d6a0;
  --accent-word: #ffd166;
  --accent2: #00c8ff;
  --glow-kata: rgba(255,60,110,0.25);
  --glow-hira: rgba(6,214,160,0.25);
  --glow-word: rgba(255,209,102,0.25);
  --accent-phrase: #b388ff;
  --glow-phrase: rgba(179,136,255,0.25);
  --accent-kanji: #ff9f43;
  --glow-kanji: rgba(255,159,67,0.25);
  --accent-kwords: #26d7ae;
  --glow-kwords: rgba(38,215,174,0.25);
  --accent-mixed: #e056fd;
  --glow-mixed: rgba(224,86,253,0.25);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
  z-index: 0;
}

.bg-chars {
  position: fixed; inset: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.bg-char {
  position: absolute;
  font-family: 'Noto Sans JP', sans-serif;
  animation: floatUp linear infinite;
  user-select: none;
  opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(105vh) rotate(-8deg); opacity: 0; }
  8%   { opacity: 1; }
  92%  { opacity: 1; }
  100% { transform: translateY(-8vh) rotate(8deg); opacity: 0; }
}

.app {
  position: relative; z-index: 1;
  width: 100%; max-width: 660px;
  padding: 2rem 1.25rem 4rem;
}

/* ── HEADER ── */
.header { text-align: center; margin-bottom: 2rem; }
.header-eyebrow {
  font-size: 0.6rem; letter-spacing: 0.5em;
  color: var(--accent2); text-transform: uppercase; margin-bottom: 0.4rem;
}
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 10vw, 4.5rem);
  letter-spacing: 0.06em; line-height: 1;
}
.header h1 .ja { color: var(--accent2); }

/* ── SYSTEM TABS ── */
.system-tabs {
  display: flex; flex-wrap: wrap; gap: 0.4rem;
  margin-bottom: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.4rem;
}
.sys-tab {
  flex: 1; min-width: calc(33% - 0.4rem); background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.65rem 0.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.4;
}
.sys-tab .tab-ja {
  display: block;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 0.1rem;
}
.sys-tab:hover { color: var(--text); border-color: var(--border); }
.sys-tab.active-kata { border-color: var(--accent-kata); color: var(--accent-kata); background: rgba(255,60,110,0.08); }
.sys-tab.active-hira { border-color: var(--accent-hira); color: var(--accent-hira); background: rgba(6,214,160,0.08); }
.sys-tab.active-word { border-color: var(--accent-word); color: var(--accent-word); background: rgba(255,209,102,0.08); }
.sys-tab.active-phrase { border-color: var(--accent-phrase); color: var(--accent-phrase); background: rgba(179,136,255,0.08); }
.sys-tab.active-kanji { border-color: var(--accent-kanji); color: var(--accent-kanji); background: rgba(255,159,67,0.08); }
.sys-tab.active-kwords { border-color: var(--accent-kwords); color: var(--accent-kwords); background: rgba(38,215,174,0.08); }
.sys-tab.active-mixed { border-color: var(--accent-mixed); color: var(--accent-mixed); background: rgba(224,86,253,0.08); }

/* ── DIRECTION TABS ── */
.dir-tabs {
  display: flex; gap: 0.4rem;
  margin-bottom: 1.25rem;
  justify-content: center;
}
.dir-tab {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.12em;
  padding: 0.35rem 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.dir-tab:hover { color: var(--text); }
.dir-tab.active { color: var(--bg); }
.dir-tab.active.kata { background: var(--accent-kata); border-color: var(--accent-kata); }
.dir-tab.active.hira { background: var(--accent-hira); border-color: var(--accent-hira); }
.dir-tab.active.word { background: var(--accent-word); border-color: var(--accent-word); }
.dir-tab.active.phrase { background: var(--accent-phrase); border-color: var(--accent-phrase); color: #fff; }
.dir-tab.active.kanji { background: var(--accent-kanji); border-color: var(--accent-kanji); color: #fff; }
.dir-tab.active.kwords { background: var(--accent-kwords); border-color: var(--accent-kwords); color: #000; }
.dir-tab.active.mixed { background: var(--accent-mixed); border-color: var(--accent-mixed); color: #fff; }

/* ── SCORE BAR ── */
.score-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0.7rem 1.1rem;
  margin-bottom: 1rem;
}
.score-item { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
.score-label { color: var(--muted); text-transform: uppercase; font-size: 0.55rem; letter-spacing: 0.15em; }
.score-value { font-size: 1.2rem; font-weight: 700; }
.sv-green { color: #06d6a0; }
.sv-red   { color: var(--accent-kata); }
.sv-gold  { color: var(--accent-word); }

/* ── PROGRESS ── */
.progress-wrap {
  background: var(--border); height: 2px;
  border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}
.progress-fill.kata { background: linear-gradient(90deg, var(--accent-kata), #ff8fa8); }
.progress-fill.hira { background: linear-gradient(90deg, var(--accent-hira), #80ffe8); }
.progress-fill.word { background: linear-gradient(90deg, var(--accent-word), #ffe8a0); }
.progress-fill.phrase { background: linear-gradient(90deg, var(--accent-phrase), #d4aaff); }
.progress-fill.kanji { background: linear-gradient(90deg, var(--accent-kanji), #ffcc88); }
.progress-fill.kwords { background: linear-gradient(90deg, var(--accent-kwords), #a8ffee); }
.progress-fill.mixed { background: linear-gradient(90deg, var(--accent-mixed), #f8b4ff); }

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 2rem 1.75rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.card-top-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  transition: background 0.3s;
}
.card-top-bar.kata { background: linear-gradient(90deg, var(--accent-kata), #ff8fa8); }
.card-top-bar.hira { background: linear-gradient(90deg, var(--accent-hira), #80ffe8); }
.card-top-bar.word { background: linear-gradient(90deg, var(--accent-word), #ffe8a0); }
.card-top-bar.phrase { background: linear-gradient(90deg, var(--accent-phrase), #d4aaff); }
.card-top-bar.kanji { background: linear-gradient(90deg, var(--accent-kanji), #ffcc88); }
.card-top-bar.kwords { background: linear-gradient(90deg, var(--accent-kwords), #a8ffee); }
.card-top-bar.mixed { background: linear-gradient(90deg, var(--accent-mixed), #f8b4ff); }

.question-num {
  font-size: 0.6rem; letter-spacing: 0.3em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 0.8rem;
}

.kana-display {
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.1;
  margin: 0.3rem 0 0.5rem;
  transition: text-shadow 0.3s;
}
.kana-display.pop { animation: popIn 0.3s cubic-bezier(.175,.885,.32,1.275); }
@keyframes popIn {
  0%   { transform: scale(0.65); opacity: 0; }
  100% { transform: scale(1);    opacity: 1; }
}
.kana-display.kata { color: var(--text); text-shadow: 0 0 60px var(--glow-kata); }
.kana-display.hira { color: var(--text); text-shadow: 0 0 60px var(--glow-hira); }
.kana-display.word { color: var(--text); text-shadow: 0 0 40px var(--glow-word); }
.kana-display.kanji { color: var(--text); text-shadow: 0 0 60px var(--glow-kanji); }
.kana-display.kwords { color: var(--text); text-shadow: 0 0 60px var(--glow-kwords); }
.kana-display.mixed { color: var(--text); text-shadow: 0 0 40px var(--glow-mixed); }

/* word hint */
.word-hint {
  font-size: 0.7rem; letter-spacing: 0.15em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 0.5rem; min-height: 1em;
}

.question-label {
  font-size: 0.7rem; letter-spacing: 0.18em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 1.2rem;
}

/* ── OPTIONS ── */
.options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.6rem; margin-top: 0.5rem;
}
.options.single-col { grid-template-columns: 1fr; }

.opt-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.08em;
  padding: 0.85rem 0.6rem;
  cursor: pointer;
  transition: all 0.15s ease;
  text-transform: uppercase;
  position: relative;
}
.opt-btn.word-opt {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1rem; letter-spacing: 0;
  text-transform: none;
}
.opt-btn:hover:not(:disabled) {
  border-color: var(--accent2);
  color: var(--accent2);
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(0,200,255,0.1);
}
.opt-btn.correct {
  border-color: #06d6a0 !important;
  background: rgba(6,214,160,0.12) !important;
  color: #06d6a0 !important;
  animation: correctPop 0.35s ease;
}
.opt-btn.wrong {
  border-color: var(--accent-kata) !important;
  background: rgba(255,60,110,0.12) !important;
  color: var(--accent-kata) !important;
  animation: shake 0.4s ease;
}
@keyframes correctPop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-7px); }
  40% { transform: translateX(7px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.opt-btn:disabled { cursor: default; }

/* ── TYPE INPUT ── */
.type-wrap {
  margin-top: 0.8rem;
  display: flex; gap: 0.5rem;
}
.type-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem; font-weight: 700;
  letter-spacing: 0.12em;
  padding: 0.8rem 1rem;
  outline: none;
  transition: border-color 0.15s;
}
.type-input:focus { border-color: var(--accent2); }
.type-input.correct { border-color: #06d6a0; background: rgba(6,214,160,0.1); color: #06d6a0; }
.type-input.wrong   { border-color: var(--accent-kata); background: rgba(255,60,110,0.1); color: var(--accent-kata); animation: shake 0.4s ease; }
.type-submit {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 0.1em;
  padding: 0.8rem 1.2rem;
  cursor: pointer;
  transition: all 0.15s;
}
.type-submit:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── FEEDBACK ── */
.feedback {
  margin-top: 1rem; font-size: 0.72rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  min-height: 1.2em;
}
.feedback.ok { color: #06d6a0; }
.feedback.ko { color: var(--accent-kata); }
.feedback .meaning { color: var(--accent-word); font-size: 0.85em; }

/* ── NEXT ── */
.next-btn {
  margin-top: 1.25rem; width: 100%;
  background: transparent;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem; letter-spacing: 0.2em;
  padding: 0.85rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: none;
}
.next-btn.kata { border: 1px solid var(--accent-kata); color: var(--accent-kata); }
.next-btn.hira { border: 1px solid var(--accent-hira); color: var(--accent-hira); }
.next-btn.word { border: 1px solid var(--accent-word); color: var(--accent-word); }
.next-btn.phrase { border: 1px solid var(--accent-phrase); color: var(--accent-phrase); }
.next-btn.kanji { border: 1px solid var(--accent-kanji); color: var(--accent-kanji); }
.next-btn.kwords { border: 1px solid var(--accent-kwords); color: var(--accent-kwords); }
.next-btn.mixed { border: 1px solid var(--accent-mixed); color: var(--accent-mixed); }
.next-btn.kata:hover { background: var(--accent-kata); color: #fff; box-shadow: 0 4px 30px var(--glow-kata); }
.next-btn.hira:hover { background: var(--accent-hira); color: #000; box-shadow: 0 4px 30px var(--glow-hira); }
.next-btn.word:hover { background: var(--accent-word); color: #000; box-shadow: 0 4px 30px var(--glow-word); }
.next-btn.phrase:hover { background: var(--accent-phrase); color: #fff; box-shadow: 0 4px 30px var(--glow-phrase); }
.next-btn.kanji:hover { background: var(--accent-kanji); color: #fff; box-shadow: 0 4px 30px var(--glow-kanji); }
.next-btn.kwords:hover { background: var(--accent-kwords); color: #000; box-shadow: 0 4px 30px var(--glow-kwords); }
.next-btn.mixed:hover { background: var(--accent-mixed); color: #fff; box-shadow: 0 4px 30px var(--glow-mixed); }
.next-btn.visible { display: block; animation: fadeUp 0.28s ease; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── RESULT ── */
#resultScreen { display:none; }
#resultScreen.visible { display:block; animation: fadeUp 0.4s ease; }
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3rem 2rem;
  text-align: center;
}
.result-emoji { font-size: 4rem; margin-bottom: 1rem; }
.result-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem; letter-spacing: 0.08em; margin-bottom: 0.4rem;
}
.result-sub { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.15em; margin-bottom: 2rem; }
.result-sub strong { color: var(--text); }
.restart-btn {
  border: none; color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem; letter-spacing: 0.2em;
  padding: 1rem 2.5rem; border-radius: 4px;
  cursor: pointer; transition: all 0.2s ease;
}
.restart-btn.kata { background: linear-gradient(135deg, var(--accent-kata), #c0003b); box-shadow: 0 4px 30px var(--glow-kata); }
.restart-btn.hira { background: linear-gradient(135deg, var(--accent-hira), #029e75); box-shadow: 0 4px 30px var(--glow-hira); color: #000; }
.restart-btn.word { background: linear-gradient(135deg, var(--accent-word), #c89b00); box-shadow: 0 4px 30px var(--glow-word); color: #000; }
.restart-btn.phrase { background: linear-gradient(135deg, var(--accent-phrase), #7c4dff); box-shadow: 0 4px 30px var(--glow-phrase); color: #fff; }
.restart-btn.kanji { background: linear-gradient(135deg, var(--accent-kanji), #e17000); box-shadow: 0 4px 30px var(--glow-kanji); color: #fff; }
.restart-btn.kwords { background: linear-gradient(135deg, var(--accent-kwords), #00967a); box-shadow: 0 4px 30px var(--glow-kwords); color: #000; }
.restart-btn.mixed { background: linear-gradient(135deg, var(--accent-mixed), #9b00cc); box-shadow: 0 4px 30px var(--glow-mixed); color: #fff; }
.restart-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
.jlpt-badge {
  display: inline-block;
  font-size: 0.6rem; letter-spacing: 0.2em;
  font-weight: 700; text-transform: uppercase;
  padding: 0.2rem 0.6rem;
  border-radius: 99px;
  margin-bottom: 0.5rem;
  border: 1px solid;
}
.jlpt-badge.N5 { color: #06d6a0; border-color: #06d6a0; background: rgba(6,214,160,0.1); }
.jlpt-badge.N4 { color: #00c8ff; border-color: #00c8ff; background: rgba(0,200,255,0.1); }
.jlpt-badge.N3 { color: #ffd166; border-color: #ffd166; background: rgba(255,209,102,0.1); }

/* ── GAME MODE TABS ── */
.game-tabs {
  display: flex; gap: 0.4rem;
  margin-bottom: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}
.game-tab {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.1em;
  padding: 0.35rem 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
}
.game-tab:hover { color: var(--text); border-color: var(--text); }
.game-tab.active { color: #fff; background: #333355; border-color: #6666aa; }
.game-tab.active.chrono { background: #7c0000; border-color: var(--accent-kata); color: var(--accent-kata); }
.game-tab.active.survie  { background: #1a0040; border-color: var(--accent-phrase); color: var(--accent-phrase); }
.game-tab.active.libre   { background: #002a1a; border-color: var(--accent-hira); color: var(--accent-hira); }

/* ── CHRONO ── */
.chrono-bar-wrap {
  background: var(--border); height: 4px;
  border-radius: 99px; margin-bottom: 1rem; overflow: hidden;
  display: none;
}
.chrono-bar { height: 100%; border-radius: 99px; transition: width 0.1s linear; background: var(--accent-kata); }

/* ── VIES (survie) ── */
.lives-display {
  text-align: center; font-size: 1.4rem;
  margin-bottom: 0.5rem; letter-spacing: 0.2rem;
  display: none;
}

/* ── REVIEW SCREEN ── */
#reviewScreen { display: none; }
#reviewScreen.visible { display: block; animation: fadeUp 0.4s ease; }
.review-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.5rem;
}
.review-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem; letter-spacing: 0.1em;
  color: var(--accent-kata); margin-bottom: 1rem; text-align: center;
}
.review-item {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.7rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}
.review-item:last-child { border-bottom: none; }
.review-kana {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 1.6rem; min-width: 2.5rem; text-align: center;
  color: var(--accent-kata);
}
.review-info { flex: 1; }
.review-reading { color: var(--muted); font-size: 0.7rem; }
.review-fr { color: var(--text); font-weight: 700; }
.review-actions {
  display: flex; gap: 0.5rem; margin-top: 1.2rem; flex-wrap: wrap;
}
.review-btn {
  flex: 1;
  background: transparent;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 0.15em;
  padding: 0.7rem; border-radius: 4px;
  cursor: pointer; transition: all 0.2s;
}
.review-btn.retry { border: 1px solid var(--accent-kata); color: var(--accent-kata); }
.review-btn.retry:hover { background: var(--accent-kata); color: #fff; }
.review-btn.next  { border: 1px solid var(--accent-hira); color: var(--accent-hira); }
.review-btn.next:hover { background: var(--accent-hira); color: #000; }

/* ── LIBRE mode score ── */
.libre-score {
  text-align: center; font-size: 0.65rem; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 0.5rem;
  display: none;
}

/* ── JLPT FILTER ── */
.jlpt-filter {
  display: none;
  gap: 0.4rem;
  margin-bottom: 1rem;
  justify-content: center;
  flex-wrap: wrap;
  align-items: center;
}
.jlpt-filter.visible { display: flex; }
.jlpt-label {
  font-size: 0.6rem; letter-spacing: 0.2em;
  color: var(--muted); text-transform: uppercase;
  margin-right: 0.3rem;
}
.jlpt-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em;
  padding: 0.3rem 0.75rem;
  cursor: pointer;
  transition: all 0.15s;
}
.jlpt-btn:hover { color: var(--text); border-color: var(--text); }
.jlpt-btn.active-all  { border-color: var(--text); color: var(--text); background: rgba(255,255,255,0.07); }
.jlpt-btn.active-N5   { border-color: #06d6a0; color: #06d6a0; background: rgba(6,214,160,0.1); }
.jlpt-btn.active-N4   { border-color: #00c8ff; color: #00c8ff; background: rgba(0,200,255,0.1); }
.jlpt-btn.active-N3   { border-color: #ffd166; color: #ffd166; background: rgba(255,209,102,0.1); }

/* ── HIRAVOCAB ── */
.sys-tab.active-hiraWords { border-color: #ff9ff3; color: #ff9ff3; background: rgba(255,159,243,0.08); }
.kana-display.hiraWords { color: var(--text); text-shadow: 0 0 60px rgba(255,159,243,0.3); }
.progress-fill.hiraWords { background: linear-gradient(90deg, #ff9ff3, #ffd6fb); }
.card-top-bar.hiraWords { background: linear-gradient(90deg, #ff9ff3, #ffd6fb); }
.next-btn.hiraWords { border: 1px solid #ff9ff3; color: #ff9ff3; }
.next-btn.hiraWords:hover { background: #ff9ff3; color: #000; }
.restart-btn.hiraWords { background: linear-gradient(135deg, #ff9ff3, #cc44cc); color: #000; }

/* ── SRS active ── */
.game-tab.active.srs { background: #1a2a00; border-color: #aaff00; color: #aaff00; }
.game-tab.active.audio { background: #001a2a; border-color: #00aaff; color: #00aaff; }
.game-tab.active.progress-btn { background: #2a1a00; border-color: #ffaa00; color: #ffaa00; }

/* ── PROGRESS CHART ── */
.prog-section { margin-bottom: 1.2rem; }
.prog-section-title {
  font-size: 0.6rem; letter-spacing: 0.25em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 0.6rem;
}
.kana-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 0.3rem;
}
.kana-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: "Noto Sans JP", sans-serif;
  font-size: 1rem;
  cursor: default;
  transition: all 0.2s;
  position: relative;
}
.kana-cell .cell-label { font-size: 0.45rem; font-family: "Space Mono",monospace; letter-spacing: 0; color: var(--muted); margin-top: 2px; }
.kana-cell.unseen  { background: var(--surface); color: var(--muted); }
.kana-cell.bad     { background: rgba(255,60,110,0.15); border-color: #ff3c6e; color: #ff3c6e; }
.kana-cell.ok      { background: rgba(255,209,102,0.15); border-color: #ffd166; color: #ffd166; }
.kana-cell.good    { background: rgba(0,200,255,0.15); border-color: #00c8ff; color: #00c8ff; }
.kana-cell.mastered{ background: rgba(6,214,160,0.18); border-color: #06d6a0; color: #06d6a0; }
.prog-legend {
  display: flex; gap: 0.8rem; flex-wrap: wrap;
  margin-top: 0.8rem; font-size: 0.6rem; letter-spacing: 0.1em; color: var(--muted);
}
.prog-legend span { display: flex; align-items: center; gap: 0.3rem; }
.prog-legend .dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
.prog-stats {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 0.5rem; margin-bottom: 1.2rem;
}
.prog-stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 0.6rem; text-align: center;
}
.prog-stat-val { font-size: 1.3rem; font-weight: 700; }
.prog-stat-lbl { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; }

/* ── AUDIO HINT ── */
.audio-hint {
  font-size: 0.65rem; letter-spacing: 0.15em; color: #00aaff;
  text-transform: uppercase; margin-bottom: 0.4rem; display: none;
  cursor: pointer; text-decoration: underline dotted;
}
.audio-hint.visible { display: block; }
</style>

    </div>

    <div class="progress-wrap">
      <div class="progress-fill kata" id="progressFill" style="width:0%"></div>
    </div>

    <!-- Question card -->
    <div class="card">
      <div class="card-top-bar kata" id="cardBar"></div>
      <div class="question-num" id="questionNum">Question 1 / 20</div>

      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn kata" id="nextBtn" onclick="nextQuestion()">Suivant →</button>
    </div>
  </div>

  </div>
</div>

// ── PERSISTENCE ──
function saveProgress() {
  try {
    localStorage.setItem('nihongo_srs', JSON.stringify(srsData));
    localStorage.setItem('nihongo_srsMode', srsMode ? '1' : '0');
  } catch(e) {}
}

function loadProgress() {
  try {
    const saved = localStorage.getItem('nihongo_srs');
    if (saved) srsData = JSON.parse(saved);
    srsMode = localStorage.getItem('nihongo_srsMode') === '1';
  } catch(e) {}
}

function resetProgress() {
  if (!confirm('Effacer toute ta progression ? Cette action est irréversible.')) return;
  srsData = {};
  saveProgress();
  showProgress(); // refresh display
}

// ── HELPERS ──
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function $id(id) { return document.getElementById(id); }

function getDataset() {
  let data;
  if (system === 'kata') return katakana;
  if (system === 'hira') return hiragana;
  if (system === 'phrase') return phrases;
  if (system === 'word') return words;
  if (system === 'kanji') data = kanji;
  else if (system === 'kanjiWords') data = kanjiWords;
  else if (system === 'mixed') data = mixedPhrases;
  else if (system === 'hiraWords') return hiraWords;
  else return words;
  // Apply JLPT filter
  if (jlptFilter !== 'all') {
    const filtered = data.filter(x => x.jlpt === jlptFilter);
    return filtered.length >= 4 ? filtered : data; // fallback if too few
  }
  return data;
}

function getColor() {
  if (system === 'kata') return 'kata';
  if (system === 'hira') return 'hira';
  if (system === 'phrase') return 'phrase';
  if (system === 'kanji') return 'kanji';
  if (system === 'kanjiWords') return 'kwords';
  if (system === 'mixed') return 'mixed';
  if (system === 'hiraWords') return 'hiraWords';
  return 'word';
}


// ── GAME MODE ──
function setGameMode(mode) {
  gameMode = mode;
  // update tab styles
  ['gNormal','gChrono','gSurvie','gLibre'].forEach(id => {
    const b = $id(id);
    b.className = 'game-tab';
  });
  const modeMap = {normal:'gNormal', chrono:'gChrono', survie:'gSurvie', libre:'gLibre'};
  const activeId = modeMap[mode];
  $id(activeId).className = `game-tab active ${mode === 'normal' ? '' : mode}`;

  // Show/hide UI elements
  $id('chronoBarWrap').style.display = mode === 'chrono' ? 'block' : 'none';
  $id('livesDisplay').style.display = mode === 'survie' ? 'block' : 'none';
  $id('libreScore').style.display = mode === 'libre' ? 'block' : 'none';

  // Hide score bar and progress in libre mode
  document.querySelector('.score-bar').style.display = mode === 'libre' ? 'none' : 'flex';
  document.querySelector('.progress-wrap').style.display = mode === 'libre' ? 'none' : 'block';

  restartQuiz();
}

function updateLivesDisplay() {
  const icons = ['❤️','❤️','❤️'].map((h,i) => i < lives ? '❤️' : '🖤').join(' ');
  $id('livesDisplay').textContent = icons;
}

function startChrono() {
  stopChrono();
  chronoLeft = CHRONO_SECS;
  const bar = $id('chronoBar');
  bar.style.width = '100%';
  bar.style.background = '#06d6a0';
  chronoTimer = setInterval(() => {
    chronoLeft -= 0.1;
    const pct = (chronoLeft / CHRONO_SECS) * 100;
    bar.style.width = pct + '%';
    if (pct > 50) bar.style.background = '#06d6a0';
    else if (pct > 25) bar.style.background = '#ffd166';
    else bar.style.background = '#ff3c6e';
    if (chronoLeft <= 0) {
      stopChrono();
      timeOut();
    }
  }, 100);
}

function stopChrono() {
  if (chronoTimer) { clearInterval(chronoTimer); chronoTimer = null; }
}

function timeOut() {
  if (answered) return;
  answered = true;
  const q = questions[current];
  mistakes.push(q);
  wrong++;
  if (gameMode === 'survie') { lives--; updateLivesDisplay(); }
  // highlight correct answer
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    let isRight = false;
    const val = b.textContent.trim();
    if (system === 'kata' || system === 'hira') isRight = direction === 'to-romaji' ? val === q.romaji : val === q.kana;
    else if (system === 'kanji') isRight = direction === 'to-kana' ? val === q.kana : val === q.fr;
    else if (system === 'kanjiWords' || system === 'mixed' || system === 'phrase') isRight = val === q.fr;
    else if (system === 'word') isRight = val === q.meaning;
    if (isRight) b.classList.add('correct');
  });
  const feedback = $id('feedback');
  feedback.textContent = '⏱ Temps écoulé !';
  feedback.className = 'feedback ko';
  $id('scoreWrong').textContent = wrong;
  $id('scoreStreak').textContent = '🔥 0';
  streak = 0;
  if (gameMode === 'survie' && lives <= 0) {
    $id('nextBtn').textContent = 'Voir résultats →';
  }
  $id('nextBtn').classList.add('visible');
}


function setJlpt(level) {
  jlptFilter = level;
  // Update button styles
  ['jAll','jN5','jN4','jN3'].forEach(id => {
    $id(id).className = 'jlpt-btn';
  });
  const idMap = {all:'jAll', N5:'jN5', N4:'jN4', N3:'jN3'};
  $id(idMap[level]).className = `jlpt-btn active-${level}`;
  restartQuiz();
}

function showJlptFilter() {
  // Show JLPT filter only for systems that have jlpt data
  const hasJlpt = ['kanji','kanjiWords','mixed'].includes(system);
  const el = $id('jlptFilter');
  el.classList.toggle('visible', hasJlpt);
  if (!hasJlpt) jlptFilter = 'all';
}

function updateLibreScore() {
  const total = current + (answered ? 1 : 0);
  $id('libreScore').innerHTML = `Questions : ${total} &nbsp;|&nbsp; Correct : <span style="color:#06d6a0">${correct}</span> &nbsp;|&nbsp; Erreurs : <span style="color:#ff3c6e">${wrong}</span>`;
}


// ── SRS ──
function getSrsKey(q) { return q.kana || q.jp || q.reading || ''; }

function toggleSRS() {
  srsMode = !srsMode;
  const btn = $id('gSRS');
  btn.className = srsMode ? 'game-tab active srs' : 'game-tab';
  restartQuiz();
}

function generateSrsQuestions() {
  const pool = getDataset();
  // Sort: unseen first, then by lowest correct count, then random
  const scored = pool.map(q => {
    const key = getSrsKey(q);
    const d = srsData[key] || {correct:0, wrong:0};
    // Weight: unseen=0, wrong>correct=1, balanced=2, mastered=3
    let weight = 0;
    if (d.correct + d.wrong > 0) {
      const ratio = d.correct / (d.correct + d.wrong);
      if (ratio < 0.5) weight = 1;
      else if (ratio < 0.8) weight = 2;
      else weight = 3;
    }
    return {q, weight, r: Math.random()};
  });
  scored.sort((a,b) => a.weight - b.weight || a.r - b.r);
  return scored.slice(0, TOTAL).map(x => x.q);
}

function updateSrs(q, wasCorrect) {
  const key = getSrsKey(q);
  if (!srsData[key]) srsData[key] = {correct:0, wrong:0};
  if (wasCorrect) srsData[key].correct++;
  else srsData[key].wrong++;
  saveProgress();
}

let audioEnabled = false;
const synth = window.speechSynthesis;

function toggleAudio() {
  audioEnabled = !audioEnabled;
  const btn = $id('gAudio');

function speakCurrent() {

function speakIfEnabled(text) {
  if (!audioEnabled || !synth) return;

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'ja-JP';
  utt.rate = 0.8;
  synth.speak(utt);
}

// ── PROGRESS ──
function getMasteryLevel(key) {
  const d = srsData[key] || {correct:0, wrong:0};
  const total = d.correct + d.wrong;
  if (total === 0) return 'unseen';
  const ratio = d.correct / total;
  if (ratio < 0.4) return 'bad';
  if (ratio < 0.65) return 'ok';
  if (ratio < 0.85) return 'good';
  return 'mastered';
}

function showProgress() {
  const screen = $id('progressScreen');
  screen.style.display = 'block';
  const el = $id('progressContent');

  // Determine which datasets to show
  const datasets = [
    {label:'カタカナ', data: katakana, keyFn: q=>q.kana, dispFn: q=>q.kana, subFn: q=>q.romaji},
    {label:'ひらがな', data: hiragana, keyFn: q=>q.kana, dispFn: q=>q.kana, subFn: q=>q.romaji},
    {label:'語彙 (ひ)', data: hiraWords, keyFn: q=>q.kana, dispFn: q=>q.kana, subFn: q=>q.reading},
    {label:'漢字', data: kanji, keyFn: q=>q.kana, dispFn: q=>q.kana, subFn: q=>q.reading},
    {label:'熟語', data: kanjiWords, keyFn: q=>q.kana, dispFn: q=>q.kana, subFn: q=>q.reading},
  ];

  const allKeys = Object.keys(srsData);
  const unseen = allKeys.length === 0 ? '—' : null;
  let totalSeen=0, totalMastered=0, totalGood=0, totalBad=0;

  datasets.forEach(ds => {
    ds.data.forEach(q => {
      const key = ds.keyFn(q);
      const lvl = getMasteryLevel(key);
      if (lvl !== 'unseen') totalSeen++;
      if (lvl === 'mastered') totalMastered++;
      if (lvl === 'good') totalGood++;
      if (lvl === 'bad') totalBad++;
    });
  });

  let html = `<div class="prog-stats">
    <div class="prog-stat"><div class="prog-stat-val" style="color:#06d6a0">${totalMastered}</div><div class="prog-stat-lbl">Maîtrisés</div></div>
    <div class="prog-stat"><div class="prog-stat-val" style="color:#00c8ff">${totalGood}</div><div class="prog-stat-lbl">Bons</div></div>
    <div class="prog-stat"><div class="prog-stat-val" style="color:#ff3c6e">${totalBad}</div><div class="prog-stat-lbl">À revoir</div></div>
    <div class="prog-stat"><div class="prog-stat-val" style="color:var(--muted)">${totalSeen}</div><div class="prog-stat-lbl">Vus</div></div>
  </div>`;

  datasets.forEach(ds => {
    html += `<div class="prog-section"><div class="prog-section-title">${ds.label}</div><div class="kana-grid">`;
    ds.data.forEach(q => {
      const key = ds.keyFn(q);
      const lvl = getMasteryLevel(key);
      html += `<div class="kana-cell ${lvl}" title="${ds.subFn(q)}">
        ${ds.dispFn(q)}
        <div class="cell-label">${ds.subFn(q).slice(0,4)}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="prog-legend">
    <span><span class="dot" style="background:#555577"></span>Non vu</span>
    <span><span class="dot" style="background:#ff3c6e"></span>À revoir</span>
    <span><span class="dot" style="background:#ffd166"></span>Moyen</span>
    <span><span class="dot" style="background:#00c8ff"></span>Bon</span>
    <span><span class="dot" style="background:#06d6a0"></span>Maîtrisé</span>
  </div>`;

  if (totalSeen === 0) {
    html = `<div style="text-align:center;color:var(--muted);padding:2rem;font-size:0.8rem;letter-spacing:0.1em">
      Joue quelques sessions pour voir ta progression ici !<br><br>
      Active le mode <strong style="color:#aaff00">🧠 SRS</strong> pour un suivi optimal.
    </div>` + html;
  }

  el.innerHTML = html;
}

function hideProgress() {
  $id('progressScreen').style.display = 'none';
}

function setSystem(s) {
  system = s;
  jlptFilter = 'all'; // reset filter on system change
  ['jAll','jN5','jN4','jN3'].forEach(id => { if($id(id)) $id(id).className = 'jlpt-btn'; });
  if($id('jAll')) $id('jAll').className = 'jlpt-btn active-all';

  if (s === 'kanji') direction = 'to-romaji';

  restartQuiz();
}

function setDir(d) {
  direction = d;
  applyTheme();
  restartQuiz();
}

// ── QUIZ LOGIC ──
function generateQuestions() {
  if (srsMode) return generateSrsQuestions();
  const data = getDataset();
  return shuffle(data).slice(0, Math.min(TOTAL, data.length));
}

function getWrongOptions(correct, pool, count) {
  // Filter out items that have the same display value to avoid confusing duplicates
  const correctKey = correct.kana || correct.jp || correct.romaji || '';
  const correctFr = correct.fr || correct.meaning || '';
  return shuffle(pool.filter(x => {
    const xKey = x.kana || x.jp || x.romaji || '';
    const xFr = x.fr || x.meaning || '';
    return x !== correct && xKey !== correctKey && xFr !== correctFr;
  })).slice(0, count);
}

function renderQuestion() {
  const q = questions[current];
  const display = $id('kanaDisplay');
  const hint = $id('wordHint');
  const label = $id('questionLabel');
  const optionsEl = $id('options');
  const feedback = $id('feedback');
  const nextBtn = $id('nextBtn');
  const c = getColor();

  $id('questionNum').textContent = `Question ${current + 1} / ${TOTAL}`;
  $id('progressFill').style.width = `${(current / questions.length) * 100}%`;
  $id('scoreTotal').textContent = `${current}/${gameMode === 'libre' ? '∞' : questions.length}`;
  feedback.textContent = '';
  feedback.className = 'feedback';
  nextBtn.classList.remove('visible');
  answered = false;

  // Chrono
  stopChrono();
  if (gameMode === 'chrono') startChrono();

  // Libre mode: generate next question on the fly if needed
  if (gameMode === 'libre') {
    updateLibreScore();
    // ensure we always have a question
    if (current >= questions.length) {
      const pool = getDataset();
      const newQ = shuffle(pool)[0];
      questions.push(newQ);
    }
  }

  // JLPT badge
  const badge = $id('jlptBadge');
  if (q.jlpt) {
    badge.textContent = q.jlpt;
    badge.className = 'jlpt-badge ' + q.jlpt;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  const typeWrap = $id('typeWrap');
  const typeInput = $id('typeInput');
  const isTypeMode = direction === 'type-romaji';

  // ── Display ──
  optionsEl.classList.remove('single-col');
  hint.textContent = '';

  if (system === 'kata' || system === 'hira') {
    if (direction === 'type-romaji' || direction === 'to-romaji') {
      display.textContent = q.kana;
      display.style.fontSize = 'clamp(5rem, 18vw, 8rem)';
      label.textContent = direction === 'type-romaji' ? 'Tape la romanisation :' : 'Quelle est la romanisation ?';
    } else {
      display.textContent = q.romaji;
      display.style.fontSize = 'clamp(2rem, 8vw, 4rem)';
      label.textContent = 'Quel est le caractère japonais ?';
    }
  } else if (system === 'kanji') {
    optionsEl.classList.add('single-col');
    if (direction === 'to-romaji') {
      display.textContent = q.kana;
      display.style.fontSize = 'clamp(5rem, 18vw, 8rem)';
      label.textContent = 'Quelle est la traduction ?';
    } else if (direction === 'to-kana') {
      display.textContent = q.fr;
      display.style.fontSize = 'clamp(1.2rem, 4vw, 1.8rem)';
      label.textContent = 'Quel est le kanji ?';
    } else {
      display.textContent = q.kana;
      display.style.fontSize = 'clamp(5rem, 18vw, 8rem)';
      label.textContent = 'Tape la lecture (romaji) :';
    }
  } else if (system === 'kanjiWords') {
    optionsEl.classList.add('single-col');
    display.textContent = q.kana;
    display.style.fontSize = 'clamp(2.5rem, 10vw, 5rem)';
    label.textContent = 'Quelle est la traduction ?';
  } else if (system === 'mixed') {
    optionsEl.classList.add('single-col');
    display.textContent = q.jp;
    display.style.fontSize = 'clamp(1.1rem, 4vw, 1.8rem)';
    label.textContent = 'Quelle est la traduction ?';
    hint.textContent = q.reading;
  } else if (system === 'hiraWords') {
    optionsEl.classList.add('single-col');
    display.textContent = q.kana;
    display.style.fontSize = 'clamp(2rem, 8vw, 4rem)';
    label.textContent = 'Quelle est la traduction ?';
  } else if (system === 'phrase') {
    optionsEl.classList.add('single-col');
    display.textContent = q.jp;
    display.style.fontSize = 'clamp(1.4rem, 5vw, 2.2rem)';
    label.textContent = 'Quelle est la traduction ?';
  } else if (system === 'word') {
    optionsEl.classList.add('single-col');
    display.textContent = q.kana;
    display.style.fontSize = 'clamp(2rem, 8vw, 3.5rem)';
    label.textContent = 'Quelle est la traduction ?';
  }

  display.className = `kana-display ${c}`;
  display.classList.remove('pop');
  void display.offsetWidth;
  display.classList.add('pop');
  // Audio
  if (audioEnabled) { const t = q.kana || q.jp || ''; speakIfEnabled(t); }

  // ── Show/hide options vs type input ──
  if (isTypeMode) {
    optionsEl.style.display = 'none';
    typeWrap.style.display = 'flex';
    typeInput.value = '';
    typeInput.className = 'type-input';
    typeInput.disabled = false;
    setTimeout(() => typeInput.focus(), 50);
  } else {
    optionsEl.style.display = '';
    optionsEl.innerHTML = '';
    typeWrap.style.display = 'none';
    const pool = getDataset();
    const wrongs = getWrongOptions(q, pool, 3);
    // Fill up to exactly 3 wrong options if needed
    const extraPool = shuffle(pool.filter(x => x !== q && !wrongs.includes(x)));
    while (wrongs.length < 3 && extraPool.length > 0) wrongs.push(extraPool.shift());
    const shuffledOpts = shuffle([q, ...wrongs.slice(0, 3)]);
    shuffledOpts.forEach(opt => {
      const btn = document.createElement('button');
      const isLong = (system === 'word' || system === 'phrase' || system === 'kanji' || system === 'kanjiWords' || system === 'mixed' || system === 'hiraWords');
      btn.className = `opt-btn${isLong ? ' word-opt' : ''}`;

      if (system === 'kata' || system === 'hira') {
        if (direction === 'to-romaji') {
          btn.textContent = opt.romaji;
        } else {
          btn.textContent = opt.kana;
          btn.style.fontFamily = "'Noto Sans JP', sans-serif";
          btn.style.fontSize = '1.4rem';
        }
      } else if (system === 'kanji') {
        if (direction === 'to-kana') {
          btn.textContent = opt.kana;
          btn.style.fontFamily = "'Noto Sans JP', sans-serif";
          btn.style.fontSize = '2rem';
        } else {
          btn.textContent = opt.fr;
        }
      } else if (system === 'kanjiWords') {
        btn.textContent = opt.fr;
      } else if (system === 'mixed') {
        btn.textContent = opt.fr;
      } else if (system === 'hiraWords') {
        btn.textContent = opt.fr;
      } else if (system === 'phrase') {
        btn.textContent = opt.fr;
      } else if (system === 'word') {
        btn.textContent = opt.meaning;
      }

      btn.onclick = () => checkAnswer(btn, opt === q, q);
      optionsEl.appendChild(btn);
    });
  }

  nextBtn.textContent = current + 1 >= questions.length ? 'Voir résultats →' : 'Suivant →';
}

function submitTyped() {
  if (answered) return;
  const q = questions[current];
  const typeInput = $id('typeInput');
  const val = typeInput.value.trim().toLowerCase();
  if (!val) return;

  let correctAnswer;
  if (system === 'kanji') correctAnswer = q.reading.toLowerCase();
  else correctAnswer = q.romaji;

  // Accept any variant separated by " / "
  const isCorrect = correctAnswer.split(' / ').map(s => s.trim()).includes(val);

  answered = true;
  stopChrono();
  typeInput.disabled = true;
  typeInput.className = 'type-input ' + (isCorrect ? 'correct' : 'wrong');

  const feedback = $id('feedback');
  const nextBtn = $id('nextBtn');

  if (isCorrect) {
    correct++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    updateSrs(q, true);
    feedback.textContent = `✓ Correct ! ${q.kana} = ${q.romaji}`;
    feedback.className = 'feedback ok';
  } else {
    wrong++;
    streak = 0;
    mistakes.push(q);
    updateSrs(q, false);
    if (gameMode === 'survie') { lives--; updateLivesDisplay(); }
    feedback.textContent = `✗ Raté ! La réponse : ${correctAnswer}`;
    feedback.className = 'feedback ko';
  }

  $id('scoreCorrect').textContent = correct;
  $id('scoreWrong').textContent = wrong;
  $id('scoreStreak').textContent = `🔥 ${streak}`;
  if (gameMode === 'survie' && lives <= 0) nextBtn.textContent = 'Voir résultats →';
  if (gameMode === 'libre') updateLibreScore();
  nextBtn.classList.add('visible');
}

function checkAnswer(btn, isCorrect, q) {
  if (answered) return;
  answered = true;

  const feedback = $id('feedback');
  const nextBtn = $id('nextBtn');
  const allBtns = document.querySelectorAll('.opt-btn');

  allBtns.forEach(b => {
    b.disabled = true;
    let isRight = false;
    const val = b.textContent.trim();
    if (system === 'kata' || system === 'hira') {
      isRight = direction === 'to-romaji' ? val === q.romaji : val === q.kana;
    } else if (system === 'kanji') {
      isRight = direction === 'to-kana' ? val === q.kana : val === q.fr;
    } else if (system === 'kanjiWords' || system === 'mixed' || system === 'phrase') {
      isRight = val === q.fr;
    } else if (system === 'word') {
      isRight = val === q.meaning;
    }
    if (isRight) b.classList.add('correct');
  });

  stopChrono();

  if (isCorrect) {
    correct++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    updateSrs(q, true);
    if (system === 'kanjiWords') {
      feedback.innerHTML = `✓ ${q.kana} — <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'mixed') {
      feedback.innerHTML = `✓ <span class="meaning">${q.fr}</span>`;
    } else if (system === 'kanji') {
      feedback.innerHTML = `✓ ${q.kana} — <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'hiraWords') {
      feedback.innerHTML = `✓ ${q.kana} — <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'phrase') {
      feedback.innerHTML = `✓ <span class="meaning">${q.fr}</span>`;
    } else if (system === 'word') {
      feedback.innerHTML = `✓ <span class="meaning">${q.kana} = ${q.meaning}</span>`;
    } else {
      feedback.textContent = `✓ Correct ! ${q.kana} = ${q.romaji}`;
    }
    feedback.className = 'feedback ok';
  } else {
    btn.classList.add('wrong');
    wrong++;
    streak = 0;
    mistakes.push(q);
    updateSrs(q, false);
    if (gameMode === 'survie') { lives--; updateLivesDisplay(); }
    if (system === 'kanjiWords') {
      feedback.innerHTML = `✗ ${q.kana} = <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'mixed') {
      feedback.innerHTML = `✗ <span class="meaning">${q.fr}</span>`;
    } else if (system === 'kanji') {
      feedback.innerHTML = `✗ ${q.kana} = <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'hiraWords') {
      feedback.innerHTML = `✗ ${q.kana} = <span class="meaning">${q.fr}</span> (${q.reading})`;
    } else if (system === 'phrase') {
      feedback.innerHTML = `✗ <span class="meaning">${q.fr}</span>`;
    } else if (system === 'word') {
      feedback.innerHTML = `✗ La réponse : <span class="meaning">${q.meaning}</span>`;
    } else {
      feedback.textContent = `✗ Raté ! ${q.kana} = ${q.romaji}`;
    }
    feedback.className = 'feedback ko';
  }

  $id('scoreCorrect').textContent = correct;
  $id('scoreWrong').textContent = wrong;
  $id('scoreStreak').textContent = `🔥 ${streak}`;
  if (gameMode === 'survie' && lives <= 0) {
    nextBtn.textContent = 'Voir résultats →';
  }
  if (gameMode === 'libre') updateLibreScore();
  nextBtn.classList.add('visible');
}

function nextQuestion() {
  current++;
  if (gameMode === 'survie' && lives <= 0) { showResult(); return; }
  if (gameMode === 'libre') {
    if (current >= questions.length) {
      const pool = getDataset();
      questions.push(...shuffle(pool).slice(0, 10));
    }
    renderQuestion();
    return;
  }
  if (current >= questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  stopChrono();
  $id('quizArea').style.display = 'none';

  const total = gameMode === 'libre' ? current : TOTAL;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  let emoji, title;
  if (pct === 100) { emoji = '🏆'; title = 'PARFAIT !'; }
  else if (pct >= 80) { emoji = '🎌'; title = 'EXCELLENT !'; }
  else if (pct >= 60) { emoji = '✨'; title = 'BIEN JOUÉ !'; }
  else if (pct >= 40) { emoji = '📚'; title = 'CONTINUEZ !'; }
  else               { emoji = '🔄'; title = 'À RETRAVAILLER'; }

  const sysLabels = {kata:'Katakana', hira:'Hiragana', word:'Mots', phrase:'Phrases', kanji:'Kanji', kanjiWords:'Mots Kanji', mixed:'Phrases Mix', hiraWords:'Vocab ひ'};
  const modeLabel = {normal:'Normal', chrono:'⏱ Chrono', survie:'💀 Survie', libre:'∞ Libre'}[gameMode];

  $id('resultEmoji').textContent = emoji;
  $id('resultTitle').textContent = title;
  $id('resultSub').innerHTML =
    `Mode : <strong>${sysLabels[system] || system}</strong> &nbsp;|&nbsp; Jeu : <strong>${modeLabel}</strong><br>Score : <strong>${correct}/${total}</strong> (${pct}%) &nbsp;|&nbsp; Streak max : <strong>${maxStreak}</strong>`;

  // Show review if there are mistakes
  if (mistakes.length > 0) {
    const list = $id('reviewList');
    list.innerHTML = '';
    const unique = [...new Map(mistakes.map(m => [m.kana || m.jp, m])).values()];
    unique.forEach(q => {
      const div = document.createElement('div');
      div.className = 'review-item';
      const display = q.kana || q.jp || '';
      const fr = q.fr || q.meaning || '';
      const reading = q.reading || q.romaji || '';
      div.innerHTML = `<div class="review-kana">${display}</div><div class="review-info"><div class="review-fr">${fr}</div><div class="review-reading">${reading}</div></div>`;
      list.appendChild(div);
    });
    $id('reviewScreen').classList.add('visible');
  } else {
    $id('resultScreen').classList.add('visible');
  }
}

function retryMistakes() {
  const pool = [...new Map(mistakes.map(m => [m.kana || m.jp, m])).values()];
  if (pool.length === 0) { restartQuiz(); return; }
  $id('reviewScreen').classList.remove('visible');
  $id('resultScreen').classList.remove('visible');
  $id('quizArea').style.display = 'block';
  questions = shuffle(pool);
  current = 0; correct = 0; wrong = 0; streak = 0; maxStreak = 0; mistakes = [];
  lives = 3; updateLivesDisplay();
  $id('scoreCorrect').textContent = 0;
  $id('scoreWrong').textContent = 0;
  $id('scoreStreak').textContent = '🔥 0';
  $id('scoreTotal').textContent = `0/${questions.length}`;
  $id('progressFill').style.width = '0%';
  applyTheme();
  renderQuestion();
}

function restartQuiz() {
  stopChrono();
  if (gameMode === 'libre') {
    // Libre: start with a big shuffled pool
    questions = shuffle(getDataset()).slice(0, 200);
  } else {
    questions = generateQuestions();
  }
  current = 0; correct = 0; wrong = 0; streak = 0; maxStreak = 0; mistakes = [];
  lives = 3; updateLivesDisplay();
  $id('scoreCorrect').textContent = 0;
  $id('scoreWrong').textContent = 0;
  $id('scoreStreak').textContent = '🔥 0';
  $id('scoreTotal').textContent = `0/${gameMode === 'libre' ? '∞' : TOTAL}`;
  $id('progressFill').style.width = '0%';
  $id('quizArea').style.display = 'block';
  $id('resultScreen').classList.remove('visible');
  $id('reviewScreen').classList.remove('visible');
  applyTheme();
  renderQuestion();
}

// ── FLOATING BG ──
const allChars = 'アイウエオカキクケコサシスセソあいうえおかきくけこさしすせそ言葉日本語';
const bgEl = $id('bgChars');
for (let i = 0; i < 22; i++) {
  const span = document.createElement('span');
  span.className = 'bg-char';
  span.textContent = allChars[Math.floor(Math.random() * allChars.length)];
  span.style.left = `${Math.random() * 100}%`;
  span.style.fontSize = `${1.5 + Math.random() * 4}rem`;
  span.style.color = ['rgba(255,60,110,0.04)','rgba(6,214,160,0.04)','rgba(255,209,102,0.04)'][i % 3];
  span.style.animationDuration = `${12 + Math.random() * 18}s`;
  span.style.animationDelay = `${-Math.random() * 25}s`;
  bgEl.appendChild(span);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '4') {
    const btns = document.querySelectorAll('.opt-btn:not(:disabled)');
    if (btns[+e.key - 1]) btns[+e.key - 1].click();
  }
  if (e.key === 'Enter') {
    const nb = $id('nextBtn');
    if (nb.classList.contains('visible')) { nb.click(); return; }
    if (direction === 'type-romaji' && !answered) { submitTyped(); return; }
  }
  if (e.key === ' ') {
    const nb = $id('nextBtn');
    if (nb.classList.contains('visible')) nb.click();
  }
});

loadProgress();
// Restore SRS mode button state if needed
if (srsMode) { const btn = $id('gSRS'); if(btn) btn.className = 'game-tab active srs'; }
restartQuiz();
</script>
</body>
</html>
